<svg width="980" height="360" viewBox="0 0 980 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.48" stop-color="#F5FBF8"/>
      <stop offset="1" stop-color="#F7F8FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 800 34px "Inter", "Segoe UI", Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 500 15px "Inter", "Segoe UI", Arial, sans-serif; fill: #64748B; letter-spacing: 0; }
      .label { font: 800 20px "Inter", "Segoe UI", Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .meta { font: 600 13px "Inter", "Segoe UI", Arial, sans-serif; fill: #64748B; letter-spacing: 0; }
      .chip { font: 700 12px "Inter", "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
      .line { stroke: #E2E8F0; stroke-width: 1; }
    </style>
  </defs>

  <rect width="980" height="360" rx="26" fill="url(#bg)"/>
  <rect x="24" y="24" width="932" height="312" rx="22" fill="white" filter="url(#shadow)"/>

  <text x="54" y="72" class="title">Capability Map</text>
  <text x="54" y="100" class="subtitle">AI product engineering across backend, frontend, GIS and mobile delivery.</text>

  <g transform="translate(54 130)">
    <rect width="270" height="82" rx="18" fill="#F0FDF4" stroke="#BBF7D0"/>
    <circle cx="38" cy="41" r="20" fill="#16A34A"/>
    <path d="M30 43h16M38 35v16" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <text x="72" y="34" class="label">AI Engineering</text>
    <text x="72" y="58" class="meta">Agents, RAG, vector search</text>
  </g>

  <g transform="translate(355 130)">
    <rect width="270" height="82" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
    <circle cx="38" cy="41" r="20" fill="#2563EB"/>
    <path d="M29 37h18M29 45h18M34 31v20M42 31v20" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <text x="72" y="34" class="label">Backend Systems</text>
    <text x="72" y="58" class="meta">Go, FastAPI, Redis, Docker</text>
  </g>

  <g transform="translate(656 130)">
    <rect width="270" height="82" rx="18" fill="#FFF7ED" stroke="#FED7AA"/>
    <circle cx="38" cy="41" r="20" fill="#EA580C"/>
    <path d="M28 46l10-13 10 13M32 46h12" stroke="white" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="34" class="label">Frontend Apps</text>
    <text x="72" y="58" class="meta">Vue, React, Next.js, TS</text>
  </g>

  <g transform="translate(54 232)">
    <rect width="270" height="72" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
    <circle cx="38" cy="36" r="19" fill="#475569"/>
    <path d="M38 24c-7 0-12 5-12 11 0 8 12 17 12 17s12-9 12-17c0-6-5-11-12-11z" stroke="white" stroke-width="3" fill="none"/>
    <circle cx="38" cy="35" r="3.5" fill="white"/>
    <text x="72" y="31" class="label">GIS / Map Dev</text>
    <text x="72" y="54" class="meta">WebGIS, maps, geo visualization</text>
  </g>

  <g transform="translate(355 232)">
    <rect width="270" height="72" rx="18" fill="#FDF2F8" stroke="#FBCFE8"/>
    <circle cx="38" cy="36" r="19" fill="#DB2777"/>
    <rect x="30" y="23" width="16" height="26" rx="5" stroke="white" stroke-width="3"/>
    <path d="M36 45h4" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <text x="72" y="31" class="label">Mobile Apps</text>
    <text x="72" y="54" class="meta">React Native, Expo, prototypes</text>
  </g>

  <g transform="translate(656 232)">
    <rect width="270" height="72" rx="18" fill="#F5F3FF" stroke="#DDD6FE"/>
    <circle cx="38" cy="36" r="19" fill="#7C3AED"/>
    <path d="M29 39l7 7 15-18" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="31" class="label">Product Delivery</text>
    <text x="72" y="54" class="meta">SaaS, billing, permissions, ops</text>
  </g>
</svg>

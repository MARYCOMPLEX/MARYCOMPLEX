      .num { font: 600 13px "Cascadia Code", "JetBrains Mono", "SF Mono", Consolas, monospace; fill: #94A3B8; }
      .label { font: 650 22px "Bahnschrift", "Aptos Display", "Segoe UI Variable Display", "SF Pro Display", "Helvetica Neue", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .line { stroke: #DCE4EE; stroke-width: 1; }
    </style>
  </defs>

  <rect width="980" height="260" fill="url(#panel)"/>
  <rect x="24" y="24" width="932" height="212" fill="#FFFFFF" stroke="#DCE4EE"/>


<svg width="980" height="390" viewBox="0 0 980 390" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <style>
      .title { font: 650 30px "Microsoft YaHei UI", "Noto Sans SC", "PingFang SC", "Source Han Sans SC", sans-serif; fill: #0F172A; letter-spacing: 0; }
      .muted { font: 450 13px "Microsoft YaHei UI", "Noto Sans SC", "PingFang SC", "Source Han Sans SC", sans-serif; fill: #64748B; letter-spacing: 0; }
      .name { font: 650 21px "Microsoft YaHei UI", "Noto Sans SC", "PingFang SC", "Source Han Sans SC", sans-serif; fill: #111827; letter-spacing: 0; }
      .desc { font: 450 14px "Microsoft YaHei UI", "Noto Sans SC", "PingFang SC", "Source Han Sans SC", sans-serif; fill: #475569; letter-spacing: 0; }
      .tag { font: 650 11px "Cascadia Code", "JetBrains Mono", "SF Mono", Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .num { font: 650 12px "Cascadia Code", "JetBrains Mono", "SF Mono", Consolas, monospace; fill: #94A3B8; }
      .line { stroke: #E2E8F0; stroke-width: 1; }
    </style>
  </defs>

  <rect width="980" height="390" fill="url(#bg)"/>
  <rect x="24" y="24" width="932" height="342" fill="#FFFFFF" stroke="#DCE4EE"/>
  <text x="54" y="67" class="title">代表项目</text>
  <text x="54" y="92" class="muted">覆盖后端系统、Agent 平台、产品交付与应用型 AI 的四个项目。</text>
  <path d="M54 114H926" class="line"/>

  <g transform="translate(54 138)">
    <rect width="410" height="82" fill="#F8FAFC" stroke="#DCE4EE"/>
    <rect width="6" height="82" fill="#2563EB"/>
    <text x="24" y="27" class="num">01</text>
    <text x="64" y="31" class="name">AnyFast AI API Gateway</text>
    <text x="64" y="56" class="desc">多租户 AI API 代理、动态路由与 RBAC 权限。</text>
    <text x="64" y="74" class="tag">Go / Redis / PostgreSQL / Casbin</text>
  </g>

  <g transform="translate(516 138)">
    <rect width="410" height="82" fill="#F8FAFC" stroke="#DCE4EE"/>
    <rect width="6" height="82" fill="#16A34A"/>
    <text x="24" y="27" class="num">02</text>
    <text x="64" y="31" class="name">AnyFast AD</text>
    <text x="64" y="56" class="desc">支持流式事件和 RAG 的 ReAct Agent 平台。</text>
    <text x="64" y="74" class="tag">Next.js / BullMQ / Redis Stream / pgvector</text>
  </g>

  <g transform="translate(54 244)">
    <rect width="410" height="82" fill="#F8FAFC" stroke="#DCE4EE"/>
    <rect width="6" height="82" fill="#EA580C"/>
    <text x="24" y="27" class="num">03</text>
    <text x="64" y="31" class="name">FindRealTaste</text>
    <text x="64" y="56" class="desc">用 AI 过滤噪声评价的真实美食发现应用。</text>
    <text x="64" y="74" class="tag">React Native / FastAPI / LangChain</text>
  </g>

  <g transform="translate(516 244)">
    <rect width="410" height="82" fill="#F8FAFC" stroke="#DCE4EE"/>
    <rect width="6" height="82" fill="#7C3AED"/>
    <text x="24" y="27" class="num">04</text>
    <text x="64" y="31" class="name">EngineerSurveyGPT</text>
    <text x="64" y="56" class="desc">面向工程测量问答的校级 RAG 系统。</text>
    <text x="64" y="74" class="tag">Python / LangGraph / Pydantic / RAG</text>
  </g>
</svg>
